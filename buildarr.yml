---
includes:
  - buildarr-secrets.yml

buildarr:
  watch_config: true

# Bazarr (Subtitles)
bazarr:
  hostname: "gluetun"
  port: 6767
  protocol: "http"

# Lidarr (Music)
lidarr:
  hostname: "gluetun"
  port: 8686
  protocol: "http"
  settings:
    media_management:
      rename_tracks: true
      replace_illegal_characters: true
      standard_track_format: "{Album Title} ({Release Year})/{track:00} - {Track Title}"
      artist_folder_format: "{Artist Name}"
      album_folder_format: "{Album Title} ({Release Year})"
      root_folders:
        - "${MEDIA_DIR}/music"
    download_clients:
      definitions:
        qBittorrent:
          type: "qbittorrent"
          enable: true
          host: "gluetun"
          port: 8080
          use_ssl: false
          category: "music"

# Prowlarr (indexer manager - required to find content)
prowlarr:
  hostname: "gluetun"
  port: 9696
  protocol: "http"

# Radarr (Movies)
radarr:
  hostname: "gluetun"
  port: 7878
  protocol: "http"
  settings:
    media_management:
      rename_movies: true
      replace_illegal_characters: true
      standard_movie_format: "{Movie CleanTitle} ({Release Year})"
      movie_folder_format: "{Movie CleanTitle} ({Release Year})"
      root_folders:
        - "${MEDIA_DIR}/movies"
    download_clients:
      definitions:
        qBittorrent:
          type: "qbittorrent"
          enable: true
          host: "gluetun"
          port: 8080
          use_ssl: false
          category: "movies"

# Sonarr (TV shows)
sonarr:
  hostname: "gluetun"
  port: 8989
  protocol: "http"
  settings:
    media_management:
      rename_episodes: true
      replace_illegal_characters: true
      standard_episode_format: "{Series Title} - S{season:00}E{episode:00} - {Episode Title}"
      series_folder_format: "{Series Title} ({Series Year})"
      season_folder_format: "Season {season:00}"
      root_folders:
        - "${MEDIA_DIR}/shows"
    download_clients:
      definitions:
        qBittorrent:
          type: "qbittorrent"
          enable: true
          host: "gluetun"
          port: 8080
          use_ssl: false
          category: "shows"
